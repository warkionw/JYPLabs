<!DOCTYPE HTML>
<html>
<head>
    <link rel="stylesheet" href="navbar.css">
<style>
body {
  background-image: url('BG4b.png');
  background-repeat: no-repeat;
  background-attachment: fixed; 
  background-size: 100% 100%;
}

#div1 {
    position: absolute;
    margin: 10px;
    padding: 10px;
    height: 40px;
    width: 50px;
}

#div2 {
    position: absolute;
    margin: 10px;
    padding: 10px;
    height: 180px;
    width: 130px;
}
#div1 {
    top: 80%;
    left: 0%;
    border: 10px solid darkcyan;
}

#div2 {
    top: 35%;
    left: 7%;
    border: 10px dashed darkblue;

}
#div1, #div2 {
    border: none;  /* Completely hides boxes */
}
</style>
<script>
function dragstartHandler(ev) {
  ev.dataTransfer.setData("text", ev.target.id);
}

function dragoverHandler(ev) {
  ev.preventDefault();
}

function dropHandler(ev) {
  ev.preventDefault();
  const data = ev.dataTransfer.getData("text");
  ev.target.appendChild(document.getElementById(data));
}

function redirectUser() {
  window.location.href = "Gel5.html";
}
</script>
</head>
<body>
<nav>
  <ul>
    <li><a href="../index.html">Home</a></li>
    <li><a href="../Module.html">Modules</a></li>
    <li><a href="../index.html#about">About</a></li>
    <li><a href="../index.html#community">Community</a></li>
    <li><a href="../index.html#reference">Reference</a></li>
    <li><a href="../index.html#contact">Contact</a></li>
  </ul>
</nav>    

<div id="div1" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)">
<img id="img1" src="Stir.png" draggable="true" ondragstart="dragstartHandler(event)" height="50px">
</div>
<div id="div2" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)" ondragend="redirectUser(event)"></div>

</body>
</html>
