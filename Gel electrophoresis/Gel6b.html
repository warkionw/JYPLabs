<!-- Counter Display - FIXED: Now shows 2.10 -->
<div id="counterDisplay" class="shadow-dance-text">2.10</div>

<!-- Micropipette Button -->
<div id="div1" 
     onmousedown="startHold()" 
     onmouseup="stopHold()" 
     onmouseleave="stopHold()">
  <img src="Pipette.png" height="400px">
</div>

<script>
let counter = 2.10;
let holdInterval = null;
const MAX_COUNT = 7.00;

function startHold() {
  if (holdInterval) return;

  holdInterval = setInterval(() => {
    if (counter >= MAX_COUNT) {
      stopHold();
      redirectUser();  // Auto redirect at 7.00
      return;
    }

    counter += 0.01;
    document.getElementById("counterDisplay").textContent = counter.toFixed(2);
  }, 30);
}

function stopHold() {
  if (holdInterval) {
    clearInterval(holdInterval);
    holdInterval = null;
  }
}

function redirectUser() {
  window.location.href = "Gel7.html";  // Your redirect page
}
</script>
