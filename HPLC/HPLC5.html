<!DOCTYPE HTML>
<html>
<head>
  <link rel="stylesheet" href="../Styling/navbar.css">
  <link rel="stylesheet" href="../Styling/common.css">
<style>
body {
  background-image: url('../HPLC/Background/BG5.png');
}
#div1 {
    position: absolute;
    margin: 10px;
    padding: 10px;
    height: 150px;
    width: 10px;
    top: 20%;
    left: 0%;
    border: 10px solid darkcyan;
}
#div2 {
    position: absolute;
    margin: 10px;
    padding: 10px;
    height: 170px;
    width: 400px;
    top: 27%;
    right: 0%;
    border: 10px dashed darkblue;
}
#div1, #div2 {
    border: none;  /* Completely hides boxes */
}
</style>
<script>
const requiredItems = { 'img1': false, 'img2': false }; // Track required items

function dragstartHandler(ev) {
  ev.dataTransfer.setData("text", ev.target.id);
}

function dragoverHandler(ev) {
  ev.preventDefault();
}

function dropHandler(ev) {
  ev.preventDefault();
  const data = ev.dataTransfer.getData("text");
  const draggedElement = document.getElementById(data);
  
  // Only accept required items
  if (requiredItems[data] !== undefined) {
    requiredItems[data] = true;
    ev.target.appendChild(draggedElement);
    
    // Check if both required items are dropped
    if (requiredItems.img1 && requiredItems.img2) {
      setTimeout(redirectUser, 500); // Small delay for visual feedback
    }
  }
}

function redirectUser() {
  window.location.href = "HPLC6A";
}
</script> 
</head>
<body>
<nav>
  <ul>
    <li><a href="../index.html">Home</a></li>
    <li><a href="../Module.html">Modules</a></li>
    <li><a href="../index.html#about">About</a></li>
    <li><a href="../index.html#community">Community</a></li>
    <li><a href="../index.html#reference">Reference</a></li>
    <li><a href="../index.html#contact">Contact</a></li>
  </ul>
</nav>

<!-- Add second draggable item (Pipette + another required item) -->
<div style="position: absolute; top: 60%; left: 0%; padding: 20px;">
  <img id="img1" src="../HPLC/Equipment Element/SIF.png" draggable="true" ondragstart="dragstartHandler(event)" height="200px">
  <img id="img2" src="../HPLC/Equipment Element/SGF.png" draggable="true" ondragstart="dragstartHandler(event)" height="200px">
</div>

<div id="div1" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>
<div id="div2" ondrop="dropHandler(event)" ondragover="dragoverHandler(event)"></div>

</body>
</html>
