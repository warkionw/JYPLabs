<!-- Counter Display - FIXED: Now shows 0.00 -->
<div id="counterDisplay" class="shadow-dance-text">0.00</div>

<!-- Micropipette Button -->
<div id="div1" 
     onmousedown="startHold()" 
     onmouseup="stopHold()" 
     onmouseleave="stopHold()">
</div>

<script>
let counter = 0.00;
let holdInterval = null;
const MAX_COUNT = 10.00;

function startHold() {
  if (holdInterval) return;

  holdInterval = setInterval(() => {
    if (counter >= MAX_COUNT) {
      stopHold();
      redirectUser();  // Auto redirect at 7.00
      return;
    }

    counter += 0.01;
    document.getElementById("counterDisplay").textContent = counter.toFixed(2);
  }, 20);
}

function stopHold() {
  if (holdInterval) {
    clearInterval(holdInterval);
    holdInterval = null;
  }
}

function redirectUser() {
  window.location.href = "HPLC2.html";  // Your redirect page
}
</script>
