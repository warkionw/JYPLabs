<!DOCTYPE HTML>
<html>
<head>
  <link rel="stylesheet" href="../navbar.css">
<style>
body {
  background-image: url('../HPLC/Background/BG6A.png');
  background-repeat: no-repeat;
  background-attachment: fixed; 
  background-size: 100% 100%;
}

#div1 {
    position: absolute;
    margin: 10px;
    padding: 10px;
    height: 150px;
    width: 10px;
}

#div2 {
    position: absolute;
    margin: 10px;
    padding: 10px;
    height: 170px;
    width: 33px;
}
#div1 {
    top: 50%;
    left: 37%;
    border: 10px solid darkcyan;
}

#div2 {
    top: 55%;
    left: 54%;
    border: 10px dashed darkblue;

}
#div1, #div2 {
    border: none;  /* Completely hides boxes */
}
</style>
<script>
function dragstartHandler(ev) {
  ev.dataTransfer.setData("text", ev.target.id);
}

function dragoverHandler(ev) {
  ev.preventDefault();
}

function dropHandler(ev) {
  ev.preventDefault();
  const data = ev.dataTransfer.getData("text");
  ev.target.appendChild(document.getElementById(data));
}

function redirectUser() {
  window.location.href = "HPLC6B";
}
</script> 
</head>
<body>
<nav>
  <ul>
    <li><a href="../index.html">Home</a></li>
    <li><a href="../Module.html">Modules</a></li>
    <li><a href="../index.html#about">About</a></li>
    <li><a href="../index.html#community">Community</a></li>
    <li><a href="../index.html#reference">Reference</a></li>
    <li><a href="../index.html#contact">Contact</a></li>
  </ul>
</nav>
<div id="div1" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)">
<img id="img1" src="../HPLC/Equipment Element/Caffeine.png" draggable="true" ondragstart="dragstartHandler(event)" height="230px">
</div>
<div id="div2" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)" ondragend="redirectUser(event)"></div>

</body>
</html>
