    <div class="game-box">
  <h1>Challenge: Stop the Timer at 10s</h1>
      <p>10s is used as a representation of the 10 min interval when sampling</p>
  <div id="timer">0.000</div>
  <button id="startBtn">Start</button>
  <div id="message"></div>
  <!-- Added: Next button to proceed to video modal after winning. Can change page if needed -->
  <button id="nextBtn" onclick="location.href='HPLC8'">Next</button>
  <!-- End Added -->
  </div>
</body>
<script>
const messageEl = document.getElementById('message');
const startBtn = document.getElementById('startBtn');
const timerEl = document.getElementById('timer');
const btn = document.getElementById('startBtn');
// Added: Get reference to Next button
const nextBtn = document.getElementById('nextBtn');
// End Added
let timer = null;
let startTime = false;
let running = false;

function startTimer() {
  startTime = performance.now();
  timer = requestAnimationFrame(updateTimer);
  btn.textContent = 'Stop';
  messageEl.textContent = '';
  running = true;
}

function stopTimer() {
  cancelAnimationFrame(timer);
  running = false;
  const elapsed = (performance.now() - startTime) / 1000;
  timerEl.textContent = elapsed.toFixed(2);
  
if (Math.abs(elapsed - 10) <= 0.5) {
    messageEl.textContent = 'Perfect! You Win!';
    messageEl.style.color = '#16a34a';
    // Added: Show Next button when player wins
    nextBtn.style.display = 'inline-block';
    // End Added
  } else if (elapsed < 10) {
    messageEl.textContent = '⏱️ Too fast!';
    messageEl.style.color = '#f43f5e';
  } else {
    messageEl.textContent = '⏳ Too slow!';
    messageEl.style.color = '#f43f5e';
  }
  btn.textContent = 'Start';
}
function updateTimer() {
  const elapsed = (performance.now() - startTime) / 1000;
  timerEl.textContent = elapsed.toFixed(2);
  timer = requestAnimationFrame(updateTimer);
}
btn.addEventListener('click', () => {
  if (running) stopTimer();
  else startTimer();
});
</script>
