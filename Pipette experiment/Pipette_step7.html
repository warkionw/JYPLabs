<!DOCTYPE HTML>
<html>
<head>
  <link rel="stylesheet" href="../Styling/navbar.css">
  <link rel="stylesheet" href="../Styling/common.css">
<style>
body {
  background-image: url('images/BG7.png');
}
#div1 {
      position: absolute;
    margin: 10px;
    padding: 10px;
    height: 400px;
    width: 85px;
}

#div2 {
    position: absolute;
    margin: 10px;
    padding: 10px;
    height: 400px;
    width: 85px;
}
#div1 {
    top: 10%;
    left: 8%;
    border: 10px solid darkcyan;
}

#div2 {
    top: 10%;
    left: 40%;
    border: 10px dashed darkblue;

}
#div1, #div2 {
border: none;  /* Completely hides boxes */
}
</style>
<script>
function dragstartHandler(ev) {
  ev.dataTransfer.setData("text", ev.target.id);
}

function dragoverHandler(ev) {
  ev.preventDefault();
}

function dropHandler(ev) {
  ev.preventDefault();
  const data = ev.dataTransfer.getData("text");
  ev.target.appendChild(document.getElementById(data));
}

function redirectUser() {
  window.location.href = "Pipette_step8";
}
</script> 
</head>
<body>
<nav>
  <ul>
    <li><a href="../index.html" class="active">Home</a></li>
    <li><a href="../Module.html">Modules</a></li>
    <li><a href="../index.html#about">About</a></li>
    <li><a href="../index.html#community">Community</a></li>
    <li><a href="../index.html#reference">Reference</a></li>
    <li><a href="../index.html#contact">Contact</a></li>
  </ul>
</nav>
<div id="div1" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)">
<img id="img1" src="Pipette.png" draggable="true" ondragstart="dragstartHandler(event)" height="500px">
</div>
<div id="div2" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)" ondragend="redirectUser(event)"></div>

</body>
</html>
