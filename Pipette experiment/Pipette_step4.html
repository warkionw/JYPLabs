<!DOCTYPE HTML>
<html>
<head>
  <link rel="stylesheet" href="../Styling/navbar.css">
  <link rel="stylesheet" href="../Styling/common.css">
<style>
body {
  background-image: url('images/BG4.png');
}

#div1 {
  position: absolute;
  margin: 10px;
  padding: 10px;
  text-align: center;
  top: 11%;
  left: 32.7%;
  border: 10px solid darkcyan;
  height: 50px;
  width: 50px;
  cursor: pointer;
}

#div1, #div2 {
    border: none;  /* Completely hides boxes */
}

/* Volume bar animation */

#volumeBar{
  position: absolute;
  width: 15px;
  height: 30px;
  background-color: #3f71d4;
  left: 120px;
  top: 215px;
  border-radius: 5px;
  transition: transform 3s linear;
}

</style>

<script>

let holdTimer = null;

function startHold(){

  document.getElementById("volumeBar").style.transform =
    "translateY(40px)";

  holdTimer = setTimeout(function(){
      redirectUser();
  },3000); // 3 seconds

}

function stopHold(){

  clearTimeout(holdTimer);

  document.getElementById("volumeBar").style.transform =
    "translateY(0px)";
}

function redirectUser(){
  window.location.href="Pipette_step5.html";
}

</script>

</head>

<body>

<nav>
<ul>
    <li><a href="../index.html">Home</a></li>
    <li><a href="../Module.html">Modules</a></li>
    <li><a href="../index.html#about">About</a></li>
    <li><a href="../index.html#community">Community</a></li>
    <li><a href="../index.html#reference">Reference</a></li>
    <li><a href="../index.html#contact">Contact</a></li>
</ul>
</nav>

<div id="div1"
onmousedown="startHold()"
onmouseup="stopHold()"
onmouseleave="stopHold()">

<div id="volumeBar"></div>

</div>

</body>
</html>
