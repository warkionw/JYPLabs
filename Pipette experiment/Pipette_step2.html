<!DOCTYPE HTML>
<html>
<head>

  <link rel="stylesheet" href="../Styling/common.css">
<style>
body {
  background-image: url('images/BG2.png');
}

#div1 {
    position: absolute;
    margin: 10px;
    padding: 10px;
    text-align: center; /* Make contents of div centered */
}

#div1 {
    top: 10%;
    left: 32%;
    border: 10px solid darkcyan;
    /* border: none */ /* To have no border */
    height: 50px;
    width: 50px;
}
#div1, #div2 {
    border: none;  /* Completely hides boxes */
}

#counterDisplay {
    letter-spacing: 50px;
    font-size: 100px;
    font-family: "Lavishly Yours", cursive;
    font-weight: 400;
    font-style: normal;
    position: absolute;
    left: 43%;

}
</style>

<script>
let counter = 0;
let holdInterval = null;
const MAX_COUNT = 140;

function startHold() {
  if (holdInterval) return;

  holdInterval = setInterval(() => {
    if (counter >= MAX_COUNT) {
      stopHold();
      return;
    }

    counter += 1;
    document.getElementById("counterDisplay").innerHTML =
      String(counter).padStart(3, "0");

    if (counter === MAX_COUNT) {
      stopHold();
    redirectUser();
    }
  }, 50); // speed (ms)
}
function redirectUser() {
  window.location.href = "Pipette_step3.html";
}
function stopHold() {
  clearInterval(holdInterval);
  holdInterval = null;
}
</script>

</body>

</body>
