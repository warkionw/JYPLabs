<!DOCTYPE HTML>
<html>
<head>
  <link rel="stylesheet" href="navbar.css">
<style>
body {
  background-image: url('BG6.png');
  background-repeat: no-repeat;
  background-attachment: fixed; 
  background-size: 100% 100%;
}

#div1 {
  position: absolute;
  margin: 10px;
  padding: 10px;
  text-align: center;
  top: 10%;
  left: 13%;
  border: 10px solid darkcyan;
  height: 50px;
  width: 50px;
  cursor: pointer;
}

#div1, #div2 {
    border: none;  /* Completely hides boxes */
}

/* Volume bar animation */

#volumeBar{
  position: absolute;
  width: 15px;
  height: 30px;
  background-color: #3f71d4;
  left: 112px;
  top: 168px;
  border-radius: 5px;
  transition: transform 3s linear;
}

</style>

<script>
let holdTimer = null;

function startHold(){
  // REVERSED: Press → bar moves UP (negative Y)
  document.getElementById("volumeBar").style.transform = "translateY(-40px)";
  
  holdTimer = setTimeout(function(){
    redirectUser();
  }, 3000);
}

function stopHold(){
  clearTimeout(holdTimer);
  
  // REVERSED: Release → bar moves DOWN (positive Y, back to 0)
  document.getElementById("volumeBar").style.transform = "translateY(0px)";
}

function redirectUser(){
  window.location.href="Pipette_step7.html";
}

</script>

</head>

<body>

<nav>
<ul>
    <li><a href="../index.html">Home</a></li>
    <li><a href="../Module.html">Modules</a></li>
    <li><a href="../index.html#about">About</a></li>
    <li><a href="../index.html#community">Community</a></li>
    <li><a href="../index.html#reference">Reference</a></li>
    <li><a href="../index.html#contact">Contact</a></li>
</ul>
</nav>

<div id="div1"
onmousedown="startHold()"
onmouseup="stopHold()"
onmouseleave="stopHold()">


<div id="volumeBar"></div>

</div>

</body>
</html>
