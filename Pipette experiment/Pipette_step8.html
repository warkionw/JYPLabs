<!DOCTYPE HTML>
<html>
<head>
  <link rel="stylesheet" href="navbar.css">
<style>
body {
  background-image: url('BG8.png');
  background-repeat: no-repeat;
  background-attachment: fixed; 
  background-size: 100% 100%;
}

#div1 {
  position: absolute;
  margin: 10px;
  padding: 10px;
  text-align: center;
  top: 10%;
  left:42%;
  border: 10px solid darkcyan;
  height: 50px;
  width: 50px;
  cursor: pointer;
}

#div1, #div2 {
    border: none;  /* Completely hides boxes */
}


/* Volume bar animation */

#volumeBar{
  position: absolute;
  width: 14px;
  height: 30px;
  background-color: #3f71d4;
  left: 135px;
  top: 170px;
  border-radius: 5px;
  transition: transform 3s linear;
}

</style>

<script>

let holdTimer = null;

function startHold(){

  document.getElementById("volumeBar").style.transform =
    "translateY(80px)";

  holdTimer = setTimeout(function(){
      redirectUser();
  },3000); // 3 seconds

}

function stopHold(){

  clearTimeout(holdTimer);

  document.getElementById("volumeBar").style.transform =
    "translateY(0px)";
}

function redirectUser(){
  window.location.href="Pipette_step9.html";
}

</script>

</head>

<body>

<nav>
<ul>
<li><a href="../index.html">Home</a></li>
<li><a href="../Module.html">Modules</a></li>
<li><a href="../index.html#about">About</a></li>
<li><a href="../index.html#community">Community</a></li>
<li><a href="../index.html#reference">Reference</a></li>
<li><a href="../index.html#contact">Contact</a></li>
</ul>
</nav>

<div id="div1"
onmousedown="startHold()"
onmouseup="stopHold()"
onmouseleave="stopHold()">

<div id="volumeBar"></div>

</div>

</body>
</html>
