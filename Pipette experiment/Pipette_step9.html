<!DOCTYPE HTML>
<html>
<head>
  <link rel="stylesheet" href="../navbar.css">
<style>
body {
  background-image: url('BG9.png');
  background-repeat: no-repeat;
  background-attachment: fixed; 
  background-size: 100% 100%;
}
#div1 {
  position: absolute;
  margin: 10px;
  padding: 10px;
  text-align: center;
  top: 15%;      /* Your exact position */
  left: 17%;     /* Your exact position */
  border: 10px solid darkcyan;
  height: 40px;
  width: 40px;
  cursor: pointer;  /* Added for click feedback */
}
#div1, #div2 {
    border: none;  /* Completely hides boxes */
}
/* Pipette tip (separate, animates but not clickable) */
#pipetteTip {
  position: absolute;
  width: 62.5px; height: 200px;
  left: 15.25%;  /* Position near pipette in your background */
  top: 48%;   /* Adjust to match your BG9.png pipette */
  transition: all 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  z-index: 10;
}
</style>

<script>
function ejectTip() {
  const tip = document.getElementById('pipetteTip');
  tip.style.transform = 'translate(0px, 400px) rotate(45deg)';
  tip.style.opacity = '0';
  
  setTimeout(() => {
    window.location.href = "Pipette_step10.html";
  }, 1200);
}
</script>
</head>

<body>
<nav>
  <ul>
    <li><a href="../index.html">Home</a></li>
    <li><a href="../Module.html">Modules</a></li>
    <li><a href="../index.html#about">About</a></li>
    <li><a href="../index.html#community">Community</a></li>
    <li><a href="../index.html#reference">Reference</a></li>
    <li><a href="../index.html#contact">Contact</a></li>
  </ul>
</nav>
<!-- YOUR EXACT #div1 styling - CLICKABLE BUTTON -->
<div id="div1" onclick="ejectTip()"></div>

<!-- Separate pipette tip (animates on button click) -->
<img id="pipetteTip" src="tip.png" alt="Pipette Tip" height="400px">
</body>
</html>
